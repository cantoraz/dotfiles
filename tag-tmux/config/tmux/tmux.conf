# vim: ft=tmux

########################################################################
# Terminal
########################################################################

# Enable 256-color (8-bit) and true-color (24-bit) support in tmux
# set    default-terminal    'tmux-256color'    # set terminal type for 256-color support
# set -a terminal-overrides  ',*256col*:Tc'     # Override to enable true-color for compatible terminals

########################################################################
# Prefix Key
########################################################################

unbind -n C-b
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

########################################################################
# General
########################################################################

set    set-clipboard on       # Use system clipboard
set -g detach-on-destroy off  # Don't exit from tmux when closing a session
set -g mouse on               # Enable mouse support
set -g set-titles on          # Set the client terminal title

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on    # Automatically renumber windows when one is closed

# Status line
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15)
set -g status-justify centre
set -g status-position top
set -g status-left-length 100   # default: 10
set -g status-right-length 100  # default: 10

# Refresh tmux config
bind R { source "~/.config/tmux/tmux.conf" ; display 'Configuration file loaded.' }

# List key bindings in all key tables
bind M-? lsk

########################################################################
# Manipulate Pane
########################################################################

# Split horizontally in CWD
unbind %
bind | { displayp -d 200 ; splitw -h -c '#{pane_current_path}' }

# Split vertically in CWD
unbind \"
bind - { displayp -d 200 ; splitw -v -c '#{pane_current_path}' }

# Select a pane
bind -n M-h { selectp -L ; displayp -d 200 }
bind -n M-j { selectp -D ; displayp -d 200 }
bind -n M-k { selectp -U ; displayp -d 200 }
bind -n M-l { selectp -R ; displayp -d 200 }

# Move a pane
bind -n M-\{ { swapp -U ; displayp -d 200 }
bind -n M-\} { swapp -D ; displayp -d 200 }

# Resize a pane
bind -r C-h resizep -L 5
bind -r C-j resizep -D 5
bind -r C-k resizep -U 5
bind -r C-l resizep -R 5
# Maximize a pane
bind -r F11 resizep -Z

########################################################################
# Manipulate Window
########################################################################

# New window in same path
bind c neww -c '#{pane_current_path}'

# Select a window
bind -n M-Left prev
bind -n M-Right next

# Move a window
bind -n M-S-Left swapw -d -t :-1
bind -n M-S-Right swapw -d -t :+1

########################################################################
# Manipulate Session
########################################################################

# Session menu
bind S menu -T "#[align=centre]#{session_name}" -x M -y W \
    Next n { switchc -n } \
    Previous p { switchc -p } \
    '' \
    Renumber N { movew -r } \
    Rename n { command-prompt -I "#S" { rename "%%" } } \
    '' \
    "New Session" s { new } \
    "New Window" w { neww }

########################################################################
# Copy Mode
########################################################################

# Enable vi mode to allow vim movements
set -g mode-keys vi

# Start selecting text
bind -T copy-mode-vi 'v' send -X begin-selection

# Copy text with
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -selection clipboard'

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Fast scroll through a pane's history
bind NPage  copy-mode -d
bind PPage  copy-mode -u
bind C-f    copy-mode -d
bind C-b    copy-mode -u
bind C-d    { copy-mode ; send C-d }
bind C-u    { copy-mode ; send C-u }

########################################################################
# Styles
########################################################################

# Load colors
source -F "#{d:current_file}/colors/tomorrow-hybrid.conf"

# Status line
set -g status-style "fg=#{@fg},bg=#{@bg},us=#{@xlight-bg},underscore"
set -g status-left "  #[fg=#{@tint},bold]#S#[default] @#H "
set -g status-right " #{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\
#[italics]#{?#{!=:#{pane_title},#h},{#{=21:pane_title}#} ,}#[default]\
#[fg=#{@magenta}]#{?#{n:pane_mode},[#{s/-mode$//:pane_mode}] ,}#[default]\
%F %R %Z "

# Status line - window
# set -g window-status-style          "bg=#{@xlight-bg}"
set -g window-status-current-style  "fg=#{@on-tint},bg=#{@tint}"
set -g window-status-last-style     "bg=#{@xlight-bg}"
set -g window-status-separator      ""
set -g window-status-bell-style     "fg=#{@red}"
set -g window-status-activity-style "#{?window_activity_flag,fg=#{@yellow},}#{?window_silence_flag,dim,}"
set -g window-status-format         "#{?window_last_flag,•, }#I:#W#{?window_marked_flag,✔,}#{?window_zoomed_flag,󰊓,} "
set -g window-status-current-format " #I:#W#{?window_marked_flag,✔,}#{?window_zoomed_flag,󰊓,} "

# Status line - messages and command prompt
set -g  message-style       "fg=#{@on-tint},bg=#{@tint}"
set -gF prompt-cursor-color "#{@on-tint}"

# Clock
set -gF clock-mode-colour "#{@tint}"

# Copy mode
set -g copy-mode-match-style          "fg=#{@bg},bg=#{@bright-yellow}"
set -g copy-mode-current-match-style  "fg=#{@bg},bg=#{@yellow}"
set -g copy-mode-position-style       "fg=#{@on-tint},bg=#{@magenta}"
set -g copy-mode-selection-style      "fg=#{@bg},bg=#{@bright-yellow}"

# Menu
set -g menu-border-style    "fg=#{@tint}"
set -g menu-selected-style  "fg=#{@on-tint},bg=#{@tint}"

# Modes
set -g mode-style "fg=#{@on-tint},bg=#{@tint}"

# Pane
set -g pane-border-style        "fg=#{@xlight-bg}"
set -g pane-active-border-style "fg=#{@tint}"
